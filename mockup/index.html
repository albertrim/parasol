<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>parasol-v2 — Live Beach 목업</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pretendard+Variable:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* =================================================================
   parasol-v2 Live Beach — Interactive Mockup (v2)
   - Collapsible control bar
   - 8 time-ordered scenarios, no time slider
   - Theme picker leftmost
   - Story player per role (multi-step interaction)
   - Stronger wow: live counters, ticking prices, "왜 다른가" badge
   ================================================================= */

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
:root {
  --phone-w: 390px;
  --phone-h: 844px;
  --radius: 28px;
  --safe-top: 54px;
  --safe-bot: 36px;
}
body {
  font-family: 'Pretendard Variable', system-ui, -apple-system, sans-serif;
  background:
    radial-gradient(1200px 600px at 20% -10%, #ffe0b2 0%, transparent 60%),
    radial-gradient(900px 600px at 100% 10%, #c1d9ff 0%, transparent 50%),
    linear-gradient(180deg, #f7f5f1 0%, #ece8df 100%);
  color: #1a1a1a;
  min-height: 100vh;
  padding: 18px 16px 80px;
  -webkit-font-smoothing: antialiased;
}
.wrap { max-width: 1320px; margin: 0 auto; }

/* ============== HEADER + COLLAPSIBLE CONTROLS ============== */
header {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 10px; margin-bottom: 12px;
}
header h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }
header h1 .sub { font-weight: 500; color: #6a665d; font-size: 13px; margin-left: 8px; }
header .meta { font-size: 12px; color: #6a665d; }
header .meta b { color: #1a1a1a; font-weight: 700; }

.toolbar {
  background: rgba(255,255,255,0.78);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(0,0,0,0.06);
  border-radius: 16px;
  margin-bottom: 22px;
  box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset;
  overflow: hidden;
}
.toolbar-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; cursor: pointer; user-select: none;
  border-bottom: 1px solid transparent;
  transition: border-color 0.2s;
}
.toolbar.open .toolbar-head { border-bottom-color: rgba(0,0,0,0.06); }
.toolbar-head .left { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 14px; }
.toolbar-head .chev {
  width: 24px; height: 24px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.05); font-size: 11px;
  transition: transform 0.25s ease;
}
.toolbar.open .toolbar-head .chev { transform: rotate(180deg); }
.toolbar-head .summary {
  font-size: 12px; color: #6a665d; font-weight: 500;
}
.toolbar-head .summary b { color: #1a1a1a; font-weight: 700; }
.toolbar-body {
  display: none; padding: 8px 16px 16px;
  grid-template-columns: 1fr;
  gap: 14px;
}
.toolbar.open .toolbar-body { display: grid; }
@media (min-width: 1000px) {
  .toolbar-body { grid-template-columns: 0.75fr 1.4fr 0.75fr; }
}

.panel { padding: 4px 0; }
.panel h3 {
  font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
  color: #6a665d; text-transform: uppercase; margin-bottom: 10px;
}
.row { display:flex; flex-wrap:wrap; gap: 6px; align-items: center; }
.pill {
  appearance: none; cursor: pointer; border: 1px solid rgba(0,0,0,0.1);
  background: white; padding: 7px 11px; border-radius: 999px;
  font: inherit; font-size: 12.5px; font-weight: 600;
  color: #2a2a2a; transition: all 0.18s ease;
  white-space: nowrap;
}
.pill:hover { transform: translateY(-1px); box-shadow: 0 3px 10px rgba(0,0,0,0.06); }
.pill.active { background: #1a1a1a; color: white; border-color: #1a1a1a; }
.pill.active.sc-heatwave   { background: #d97706; border-color: #d97706; }
.pill.active.sc-sunset     { background: #8b3a62; border-color: #8b3a62; }
.pill.active.sc-rain       { background: #2563eb; border-color: #2563eb; }
.pill.active.sc-night      { background: #1e293b; border-color: #1e293b; }
.pill.active.sc-tide       { background: #0891b2; border-color: #0891b2; }
.pill.active.sc-morning    { background: #84cc16; border-color: #84cc16; }
.pill.active.sc-heatup     { background: #f59e0b; border-color: #f59e0b; }

/* ============== PHONES ============== */
.phones {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(var(--phone-w), 1fr));
  gap: 32px; justify-content: center; justify-items: center;
}
.phone {
  width: var(--phone-w); height: var(--phone-h);
  background: #0a0a0a;
  border-radius: var(--radius);
  padding: 12px;
  box-shadow:
    0 0 0 2px rgba(255,255,255,0.04) inset,
    0 30px 60px -20px rgba(0,0,0,0.45),
    0 10px 30px -10px rgba(0,0,0,0.3);
  position: relative;
}
.phone::before {
  content: ""; position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
  width: 120px; height: 28px; background: #0a0a0a; border-radius: 999px;
  z-index: 10; pointer-events: none;
}
.phone::after {
  content: ""; position: absolute; top: 24px; left: calc(50% + 36px);
  width: 8px; height: 8px; border-radius: 50%; background: #18181b;
  z-index: 11; pointer-events: none;
}
.screen {
  width: 100%; height: 100%; overflow: hidden;
  border-radius: calc(var(--radius) - 12px); position: relative;
  background: white;
}
.screen-label {
  position: absolute; bottom: -28px; left: 0; right: 0; text-align: center;
  font-size: 12px; font-weight: 600; color: #6a665d;
}

/* status bar */
.statusbar {
  position: absolute; top: 0; left: 0; right: 0; height: var(--safe-top);
  display: flex; align-items: flex-end; justify-content: space-between;
  padding: 8px 28px 6px; font-size: 13px; font-weight: 700; z-index: 6;
  color: var(--statusbar-color, #1a1a1a); pointer-events: none;
}
.statusbar .icons { display: flex; gap: 6px; align-items: center; }
.home-indicator {
  position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
  width: 134px; height: 5px; border-radius: 999px;
  background: var(--home-indicator-color, rgba(0,0,0,0.25));
  z-index: 5; pointer-events: none;
}
.screen-body {
  position: absolute; top: var(--safe-top); bottom: 0;
  left: 0; right: 0; overflow-y: auto; overflow-x: hidden;
  padding: 4px 16px calc(var(--safe-bot) + 8px);
  scrollbar-width: none; -ms-overflow-style: none;
}
.screen-body::-webkit-scrollbar { display: none; }

/* ============================================================
   THEME A — Sunglasses Minimal
   ============================================================ */
.t-A {
  --bg: #faf7f1;
  --bg-soft: #f0ece3;
  --ink: #1a1a1a;
  --ink-soft: #5a564e;
  --line: rgba(26,26,26,0.08);
  --accent: #1a1a1a;
  --accent-warm: #d97706;
  --accent-cool: #2563eb;
  --statusbar-color: #1a1a1a;
  --home-indicator-color: rgba(0,0,0,0.3);
  --card: #ffffff;
  --card-radius: 18px;
  --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 14px rgba(0,0,0,0.04);
  --font: 'Pretendard Variable', system-ui, sans-serif;
}

/* ============================================================
   THEME B — Deep Water  ❄️
   ============================================================ */
.t-B {
  --ink: #f0fbff;
  --ink-soft: rgba(220,240,255,0.72);
  --line: rgba(180,220,255,0.18);
  --accent: #ffffff;
  --accent-warm: #7dd3fc;
  --accent-cool: #67e8f9;
  --statusbar-color: #f0fbff;
  --home-indicator-color: rgba(255,255,255,0.6);
  --card: rgba(8,32,58,0.55);
  --card-radius: 22px;
  --shadow: 0 6px 28px rgba(0,30,60,0.35), 0 0 0 1px rgba(180,220,255,0.06) inset;
  --font: 'Pretendard Variable', system-ui, sans-serif;
}
.t-B .screen {
  background:
    radial-gradient(110% 80% at 20% 0%, rgba(125,211,252,0.18) 0%, transparent 55%),
    radial-gradient(120% 80% at 80% 100%, rgba(8,145,178,0.45) 0%, transparent 60%),
    linear-gradient(180deg, #0c4a6e 0%, #0e7490 35%, #1e3a8a 75%, #0b1f4a 100%);
  color: var(--ink); position: relative;
}
.t-B .screen::after {
  content: ""; position: absolute; inset: 0; pointer-events: none;
  background-image:
    radial-gradient(circle at 15% 30%, rgba(255,255,255,0.06) 0 1px, transparent 2px),
    radial-gradient(circle at 65% 20%, rgba(255,255,255,0.04) 0 1px, transparent 2px),
    radial-gradient(circle at 85% 60%, rgba(255,255,255,0.05) 0 1px, transparent 2px),
    radial-gradient(circle at 25% 80%, rgba(255,255,255,0.05) 0 1px, transparent 2px),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,0.03) 0 1px, transparent 2px),
    radial-gradient(circle at 90% 90%, rgba(255,255,255,0.04) 0 1px, transparent 2px);
  background-size: 220px 220px, 180px 180px, 260px 260px, 200px 200px, 240px 240px, 200px 200px;
  mix-blend-mode: screen; opacity: 0.9; z-index: 1;
}
.t-B .screen-body { z-index: 2; }
@keyframes t-b-float {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-1.5px); }
}
.t-B .hero, .t-B .groupbuy, .t-B .store-card, .t-B .order-row,
.t-B .pickup-row, .t-B .live-order, .t-B .policy-card {
  backdrop-filter: blur(18px) saturate(140%);
  -webkit-backdrop-filter: blur(18px) saturate(140%);
}

/* ============================================================
   THEME C — Mint Paper  ☘️
   ============================================================ */
.t-C {
  --bg: #fbfffe;
  --bg-soft: #ecf9f4;
  --ink: #0f3a32;
  --ink-soft: #5f7e76;
  --line: #d6ece4;
  --accent: #0f3a32;
  --accent-warm: #14b8a6;
  --accent-cool: #0d9488;
  --statusbar-color: #0f3a32;
  --home-indicator-color: rgba(15,58,50,0.3);
  --card: #ffffff;
  --card-radius: 14px;
  --shadow: 0 1px 0 #d6ece4, 0 4px 16px rgba(15,58,50,0.06);
  --font: 'Pretendard Variable', system-ui, sans-serif;
}
.t-C .screen {
  background:
    radial-gradient(80% 50% at 100% 0%, rgba(20,184,166,0.06) 0%, transparent 60%),
    var(--bg);
  color: var(--ink);
}
.t-C .screen::after {
  content: ""; position: absolute; inset: var(--safe-top) 0 var(--safe-bot) 0; pointer-events: none;
  background-image:
    radial-gradient(circle at 22% 18%, rgba(15,58,50,0.025) 0 0.5px, transparent 1.5px),
    radial-gradient(circle at 78% 42%, rgba(15,58,50,0.02)  0 0.5px, transparent 1.5px),
    radial-gradient(circle at 40% 80%, rgba(15,58,50,0.022) 0 0.5px, transparent 1.5px);
  background-size: 120px 120px, 160px 160px, 140px 140px; z-index: 1;
}
.t-C .screen-body { z-index: 2; }

/* ============================================================
   SHARED COMPONENTS
   ============================================================ */
.screen { font-family: var(--font); color: var(--ink); background: var(--bg, #faf7f1); }
.t-A .screen { background: var(--bg); }

/* === Top identity bar === */
.top-id {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--ink-soft); margin-top: 4px; margin-bottom: 10px;
}
.top-id .dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; }
.top-id .pid { font-weight: 700; color: var(--ink); }

/* === Context chip strip — fact-grid scrolling horizontally === */
.cstrip {
  display: flex; gap: 6px; overflow-x: auto; margin-bottom: 14px;
  scrollbar-width: none; -ms-overflow-style: none;
  padding-bottom: 2px;
}
.cstrip::-webkit-scrollbar { display: none; }
.cstrip .ck {
  background: var(--card); border: 1px solid var(--line);
  padding: 8px 12px; border-radius: 12px;
  font-size: 11px; color: var(--ink-soft); font-weight: 600;
  display: flex; flex-direction: column; gap: 2px;
  min-width: 96px; flex-shrink: 0;
}
.cstrip .ck b { font-size: 14px; color: var(--ink); font-weight: 800; }
.t-B .cstrip .ck { backdrop-filter: blur(14px); border-color: var(--line); }

/* === Hero context card === */
.hero {
  background: var(--card);
  border-radius: var(--card-radius);
  padding: 18px;
  box-shadow: var(--shadow);
  margin-bottom: 14px;
  border: 1px solid var(--line);
  position: relative; overflow: hidden;
}
.t-B .hero { border-color: var(--line); position: relative; }
.t-B .hero::before {
  content: ""; position: absolute; top: -20px; right: -20px;
  width: 120px; height: 120px;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.18) 0%, transparent 60%);
  pointer-events: none;
}
.hero .label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
  color: var(--ink-soft); text-transform: uppercase;
}
.hero .temp {
  font-size: 56px; font-weight: 800; letter-spacing: -0.04em; line-height: 1;
  margin: 6px 0 2px; font-variant-numeric: tabular-nums;
}
.t-B .hero .temp { text-shadow: 0 0 24px rgba(125,211,252,0.4); }
.hero .feels { font-size: 13px; font-weight: 600; color: var(--ink-soft); }
.hero .feels .hot { color: var(--accent-warm); font-weight: 800; }
.hero .feels .cool { color: var(--accent-cool); font-weight: 800; }
.t-B .feels .hot { color: #fb923c; }
.t-B .feels .cool { color: #67e8f9; }
.t-C .feels .hot { color: #14b8a6; }
.t-C .feels .cool { color: #0d9488; }
.hero-meta {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
  margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line);
}
.hero-meta div { font-size: 11px; color: var(--ink-soft); }
.hero-meta div b { display: block; font-size: 14px; color: var(--ink); font-weight: 700; margin-top: 2px; }

/* === Trigger banner === */
.trigger {
  border-radius: var(--card-radius); padding: 14px 16px; margin-bottom: 12px;
  color: white; box-shadow: var(--shadow);
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  position: relative; overflow: hidden;
}
.trigger .copy { flex: 1; min-width: 0; }
.trigger .copy .ti { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.9; }
.trigger .copy .body { font-size: 15px; font-weight: 700; margin-top: 4px; line-height: 1.35; }
.trigger .cta { font-size: 13px; font-weight: 800; padding: 8px 12px; border-radius: 999px; background: rgba(0,0,0,0.18); white-space: nowrap; }
.trigger.heat   { background: linear-gradient(135deg, #ff5b3b, #d97706); }
.trigger.sunset { background: linear-gradient(135deg, #b1473f, #5b2c5f); }
.trigger.rain   { background: linear-gradient(135deg, #475569, #1e3a8a); }
.trigger.tide   { background: linear-gradient(135deg, #0891b2, #1e3a8a); }
.trigger.morning { background: linear-gradient(135deg, #84cc16, #16a34a); }
.trigger.heatup  { background: linear-gradient(135deg, #f59e0b, #d97706); }
.trigger.night   { background: linear-gradient(135deg, #1e293b, #0f172a); }
.t-B .trigger.heat   { background: linear-gradient(135deg, #0891b2, #1e3a8a); }
.t-B .trigger.sunset { background: linear-gradient(135deg, #6366f1, #1e3a8a); }
.t-B .trigger.rain   { background: linear-gradient(135deg, #155e75, #1e3a8a); }
.t-B .trigger.tide   { background: linear-gradient(135deg, #0e7490, #1e3a8a); }
.t-B .trigger.morning{ background: linear-gradient(135deg, #06b6d4, #0e7490); }
.t-B .trigger.heatup { background: linear-gradient(135deg, #0891b2, #155e75); }
.t-B .trigger.night  { background: linear-gradient(135deg, #1e3a8a, #0b1f4a); }
.t-C .trigger.heat   { background: linear-gradient(135deg, #14b8a6, #0d9488); }
.t-C .trigger.sunset { background: linear-gradient(135deg, #ec4899, #be185d); }
.t-C .trigger.rain   { background: linear-gradient(135deg, #0d9488, #0f3a32); }
.t-C .trigger.tide   { background: linear-gradient(135deg, #14b8a6, #0c4a6e); }
.t-C .trigger.morning{ background: linear-gradient(135deg, #14b8a6, #15803d); }
.t-C .trigger.heatup { background: linear-gradient(135deg, #14b8a6, #0d9488); }
.t-C .trigger.night  { background: linear-gradient(135deg, #0f3a32, #052e2b); }

/* === Group buy card === */
.groupbuy {
  background: var(--card); border-radius: var(--card-radius);
  padding: 16px; border: 1px solid var(--line); box-shadow: var(--shadow);
  margin-bottom: 14px;
}
.gb-head { display: flex; align-items: center; justify-content: space-between; }
.gb-head .gbt {
  font-size: 11px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--accent-warm); padding: 4px 8px; border-radius: 999px;
  background: rgba(217,119,6,0.12);
}
.t-B .gb-head .gbt { background: rgba(103,232,249,0.16); color: #a5f3fc; }
.t-C .gb-head .gbt { background: #d6ece4; color: #0d9488; }
.gb-head .timer {
  font-variant-numeric: tabular-nums; font-weight: 700; font-size: 13px; color: var(--ink-soft);
}
.t-C .timer { animation: t-c-pulse 2.4s ease-in-out infinite; border-radius: 8px; padding: 2px 6px; }
.t-C .timer::before { content: "🧊 "; }
@keyframes t-c-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(20,184,166,0.0); }
  50%      { box-shadow: 0 0 0 4px rgba(20,184,166,0.18); }
}
.gb-item { font-size: 17px; font-weight: 800; margin: 10px 0 4px; letter-spacing: -0.01em; }
.gb-price { display: flex; align-items: baseline; gap: 8px; }
.gb-price .now {
  font-size: 28px; font-weight: 800; letter-spacing: -0.02em;
  color: var(--accent-warm); font-variant-numeric: tabular-nums;
  transition: color 0.4s ease;
}
.t-B .gb-price .now { color: #67e8f9; text-shadow: 0 0 12px rgba(103,232,249,0.4); }
.t-C .gb-price .now { color: #0d9488; }
.gb-price .was { font-size: 14px; color: var(--ink-soft); text-decoration: line-through; }
.gb-price .delta {
  font-size: 12px; font-weight: 800; color: white; background: var(--accent-warm);
  padding: 2px 8px; border-radius: 999px;
}
.t-B .gb-price .delta { background: #06b6d4; }
.t-C .gb-price .delta { background: #14b8a6; }
.progress {
  margin-top: 10px; height: 8px; border-radius: 999px;
  background: rgba(0,0,0,0.08); overflow: hidden; position: relative;
}
.t-B .progress { background: rgba(180,220,255,0.18); }
.progress .fill {
  height: 100%; background: linear-gradient(90deg, var(--accent-warm), #ff5b3b);
  transition: width 0.7s ease;
}
.t-B .progress .fill { background: linear-gradient(90deg, #67e8f9, #38bdf8); }
.t-C .progress .fill { background: linear-gradient(90deg, #14b8a6, #06b6d4); }
.progress-meta {
  display: flex; justify-content: space-between; font-size: 11px;
  color: var(--ink-soft); margin-top: 6px;
}
.progress-meta b { color: var(--ink); font-variant-numeric: tabular-nums; }

/* === Avatars row === */
.avatars { display: flex; margin-top: 8px; }
.avatars span {
  width: 22px; height: 22px; border-radius: 50%; margin-left: -6px;
  border: 2px solid var(--card);
  background: linear-gradient(135deg, #fbbf24, #f97316);
  display:inline-flex; align-items:center; justify-content:center;
  font-size: 10px; color: white; font-weight: 800;
}
.avatars span:nth-child(2) { background: linear-gradient(135deg, #60a5fa, #2563eb); }
.avatars span:nth-child(3) { background: linear-gradient(135deg, #f472b6, #be185d); }
.avatars span:nth-child(4) { background: linear-gradient(135deg, #34d399, #059669); }
.avatars span.more { background: var(--ink); color: white; font-size: 10px; }

/* === Menu === */
.section-title {
  font-size: 13px; font-weight: 800; margin: 18px 0 10px; letter-spacing: -0.01em;
}
.section-title .all { float: right; font-size: 12px; color: var(--ink-soft); font-weight: 600; }
.store-card {
  background: var(--card); border-radius: var(--card-radius);
  padding: 14px; margin-bottom: 10px; box-shadow: var(--shadow);
  border: 1px solid var(--line);
  display: flex; gap: 12px; align-items: center;
}
.store-img {
  width: 52px; height: 52px; border-radius: 12px;
  background: linear-gradient(135deg, #fcd34d, #f97316);
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-size: 24px;
}
.store-meta { flex: 1; min-width: 0; }
.store-name { font-size: 15px; font-weight: 700; }
.store-info { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
.store-eta {
  font-size: 12px; font-weight: 800; color: var(--accent-cool);
  padding: 4px 8px; border-radius: 999px; background: rgba(37,99,235,0.1);
}
.t-B .store-eta { background: rgba(103,232,249,0.18); color: #a5f3fc; }
.t-C .store-eta { background: #d6ece4; color: #0d9488; }

.filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.chip {
  padding: 7px 12px; border-radius: 999px; font-size: 12px; font-weight: 700;
  background: var(--card); border: 1px solid var(--line); color: var(--ink);
  cursor: pointer;
}
.chip.active { background: var(--ink); color: var(--bg, white); border-color: var(--ink); }
.t-B .chip { background: rgba(8,32,58,0.45); color: var(--ink); backdrop-filter: blur(10px); }
.t-B .chip.active { background: #67e8f9; color: #0b1f4a; border-color: #67e8f9; }
.t-C .chip { background: #ffffff; color: var(--ink); border-color: var(--line); }
.t-C .chip.active { background: #0f3a32; color: #fbfffe; border-color: #0f3a32; }

/* === MERCHANT === */
.order-row {
  background: var(--card); border-radius: var(--card-radius);
  padding: 14px; margin-bottom: 10px; box-shadow: var(--shadow);
  border: 1px solid var(--line);
  border-left: 4px solid var(--accent-warm);
}
.t-B .order-row { border-left-color: #67e8f9; }
.t-C .order-row { border-left-color: #14b8a6; }
.or-head { display: flex; justify-content: space-between; align-items: center; }
.or-id { font-size: 12px; font-weight: 700; color: var(--ink-soft); }
.or-elapsed { font-variant-numeric: tabular-nums; font-size: 12px; font-weight: 800; color: var(--accent-warm); }
.t-B .or-elapsed { color: #67e8f9; }
.t-C .or-elapsed { color: #14b8a6; }
.or-items { font-size: 14px; font-weight: 700; margin-top: 6px; line-height: 1.4; }
.or-loc { font-size: 12px; color: var(--ink-soft); margin-top: 4px; display:flex; gap:6px; align-items:center; }
.or-stage { display: flex; gap: 4px; margin-top: 10px; }
.or-stage span { flex: 1; height: 4px; border-radius: 2px; background: rgba(0,0,0,0.08); }
.t-B .or-stage span { background: rgba(180,220,255,0.18); }
.or-stage span.done { background: var(--accent-warm); }
.t-B .or-stage span.done { background: #67e8f9; }
.t-C .or-stage span.done { background: #14b8a6; }

.policy-card {
  background: var(--card); border-radius: var(--card-radius);
  padding: 14px; margin-top: 14px; border: 1px solid var(--line);
  box-shadow: var(--shadow);
}
.policy-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0; font-size: 13px; font-weight: 600;
}
.policy-row + .policy-row { border-top: 1px solid var(--line); }
.toggle {
  width: 36px; height: 20px; border-radius: 999px;
  background: rgba(0,0,0,0.18); position: relative; cursor: pointer; transition: background 0.2s;
}
.t-B .toggle { background: rgba(180,220,255,0.22); }
.t-C .toggle { background: #d6ece4; }
.toggle::after {
  content: ""; position: absolute; top: 2px; left: 2px;
  width: 16px; height: 16px; border-radius: 50%; background: white;
  transition: transform 0.2s;
}
.toggle.on { background: #22c55e; }
.toggle.on::after { transform: translateX(16px); }
.t-C .toggle.on { background: #14b8a6; }

/* === COURIER === */
.map {
  background: var(--card); border-radius: var(--card-radius);
  height: 200px; margin-bottom: 14px; position: relative;
  overflow: hidden; border: 1px solid var(--line); box-shadow: var(--shadow);
}
.map-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(60% 60% at 20% 50%, rgba(255,250,240,0.6) 0%, transparent 70%),
    linear-gradient(180deg, #c1e4ff 0%, #92cffa 35%, #f1e2c0 36%, #ead8b0 100%);
}
.t-B .map-bg {
  background:
    linear-gradient(180deg, rgba(8,145,178,0.55) 0%, rgba(14,116,144,0.55) 45%, rgba(125,211,252,0.35) 46%, rgba(8,32,58,0.55) 100%);
}
.t-C .map-bg {
  background:
    radial-gradient(60% 60% at 20% 50%, rgba(214,236,228,0.85) 0%, transparent 70%),
    linear-gradient(180deg, #ecfbf5 0%, #d6ece4 35%, #fbfffe 36%, #ecf9f4 100%);
}
.map-pin {
  position: absolute; transform: translate(-50%, -100%);
  font-size: 18px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
}
.map-pin.me { font-size: 22px; }
.map-route { position: absolute; inset: 0; pointer-events: none; }

.pickup-row {
  background: var(--card); border-radius: var(--card-radius);
  padding: 12px 14px; margin-bottom: 10px; border: 1px solid var(--line);
  box-shadow: var(--shadow);
  display: flex; align-items: center; gap: 12px;
}
.pickup-num {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--accent-warm); color: white;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 14px; flex-shrink: 0;
}
.t-B .pickup-num { background: #0891b2; }
.t-C .pickup-num { background: #14b8a6; }
.pickup-meta { flex: 1; min-width: 0; }
.pickup-from { font-size: 13px; font-weight: 700; }
.pickup-to { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
.pickup-eta { font-size: 11px; color: var(--ink-soft); font-weight: 600; text-align: right; }
.pickup-eta b { display: block; font-size: 15px; color: var(--ink); font-weight: 800; }

/* === Live order tracker === */
.live-order {
  background: var(--card); border-radius: var(--card-radius);
  padding: 16px; margin-bottom: 14px; border: 1px solid var(--line);
  box-shadow: var(--shadow);
}
.live-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.live-head .tag {
  font-size: 11px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase;
  padding: 4px 8px; border-radius: 999px;
  background: rgba(34,197,94,0.18); color: #15803d;
}
.t-B .live-head .tag { background: rgba(103,232,249,0.22); color: #a5f3fc; }
.t-C .live-head .tag { background: #d6ece4; color: #0d9488; }
.live-eta {
  font-size: 30px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -0.02em;
}
.t-B .live-eta { text-shadow: 0 0 12px rgba(103,232,249,0.3); }
.live-eta .unit { font-size: 14px; color: var(--ink-soft); font-weight: 600; }
.steps { display: flex; align-items: center; margin-top: 12px; gap: 4px; }
.steps .step {
  flex: 1; height: 6px; border-radius: 999px; background: rgba(0,0,0,0.08); position: relative;
}
.t-B .steps .step { background: rgba(180,220,255,0.18); }
.steps .step.done { background: #22c55e; }
.t-B .steps .step.done { background: #67e8f9; }
.t-C .steps .step.done { background: #14b8a6; }
.steps .step.active { background: linear-gradient(90deg, #22c55e 50%, rgba(0,0,0,0.08) 50%); }
.t-B .steps .step.active { background: linear-gradient(90deg, #67e8f9 50%, rgba(180,220,255,0.18) 50%); }
.t-C .steps .step.active { background: linear-gradient(90deg, #14b8a6 50%, rgba(0,0,0,0.08) 50%); }
.step-labels { display:flex; justify-content: space-between; font-size: 10px; color: var(--ink-soft); margin-top: 6px; font-weight: 600; }

/* === Courier-near banner (the "30m 앞" wow) === */
.courier-near {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--card-radius); padding: 12px 14px;
  display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
  box-shadow: var(--shadow); position: relative;
}
.courier-near .ring {
  width: 42px; height: 42px; border-radius: 50%;
  background: linear-gradient(135deg, #fcd34d, #f59e0b);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0; position: relative;
}
.courier-near .ring::after {
  content: ""; position: absolute; inset: -3px; border-radius: 50%;
  border: 2px solid #f59e0b; animation: ping-ring 2s ease-out infinite;
}
@keyframes ping-ring {
  0%   { transform: scale(1); opacity: 0.6; }
  100% { transform: scale(1.6); opacity: 0; }
}
.courier-near .body { flex: 1; }
.courier-near .body .t { font-size: 11px; color: var(--ink-soft); font-weight: 600; }
.courier-near .body .n { font-size: 14px; font-weight: 800; margin-top: 2px; }
.courier-near .dist {
  font-size: 18px; font-weight: 800; color: var(--accent-warm);
  font-variant-numeric: tabular-nums;
}
.t-B .courier-near .dist { color: #67e8f9; }
.t-C .courier-near .dist { color: #14b8a6; }

/* === Checkout sheet === */
.sheet {
  background: var(--card); border-radius: 20px; border: 1px solid var(--line);
  padding: 18px; box-shadow: var(--shadow); margin-bottom: 12px;
}
.sheet .h { font-size: 12px; color: var(--ink-soft); font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; }
.sheet .item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; font-size: 14px; font-weight: 600; }
.sheet .item-row + .item-row { border-top: 1px solid var(--line); }
.sheet .total {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-top: 8px; padding-top: 12px; border-top: 2px solid var(--ink);
  font-weight: 800;
}
.sheet .total .amt {
  font-size: 28px; font-variant-numeric: tabular-nums; letter-spacing: -0.02em;
  color: var(--accent-warm);
}
.t-B .sheet .total .amt { color: #67e8f9; }
.t-C .sheet .total .amt { color: #0d9488; }
.cta-btn {
  width: 100%; padding: 14px; border-radius: 14px; border: none;
  background: var(--ink); color: var(--bg, white);
  font: inherit; font-size: 15px; font-weight: 800;
  cursor: pointer; margin-top: 8px;
}
.t-A .cta-btn { background: #1a1a1a; color: white; }
.t-B .cta-btn { background: #67e8f9; color: #0b1f4a; }
.t-C .cta-btn { background: #0f3a32; color: #fbfffe; }
.savings {
  display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700;
  color: var(--accent-warm); margin-top: 6px;
}
.t-B .savings { color: #67e8f9; }
.t-C .savings { color: #14b8a6; }

/* === Rating modal === */
.rating-card {
  background: var(--card); border-radius: 20px; padding: 22px;
  border: 1px solid var(--line); box-shadow: var(--shadow); margin-bottom: 12px;
  text-align: center;
}
.rating-card .big { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 4px; }
.rating-card .sub { font-size: 13px; color: var(--ink-soft); margin-bottom: 18px; }
.rating-card .stars { display: flex; justify-content: center; gap: 6px; font-size: 30px; margin-bottom: 14px; }
.rating-card .stars span.on { filter: none; }
.rating-card .stars span:not(.on) { filter: grayscale(1) opacity(0.4); }
.rating-card .weather-adj {
  background: rgba(0,0,0,0.04); border-radius: 12px; padding: 10px 12px;
  font-size: 12px; color: var(--ink-soft); margin-top: 8px; text-align: left;
  line-height: 1.5;
}
.t-B .rating-card .weather-adj { background: rgba(255,255,255,0.06); }
.t-C .rating-card .weather-adj { background: #ecf9f4; }
.rating-card .weather-adj b { color: var(--ink); }

/* === Story player UI === */
.story-bar {
  position: sticky; bottom: 0; left: 0; right: 0; z-index: 8;
  margin: 20px auto 0; max-width: 720px;
  background: rgba(20,20,20,0.92); color: white;
  backdrop-filter: blur(16px);
  border-radius: 18px; padding: 12px 16px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: 0 12px 36px rgba(0,0,0,0.28);
}
.story-bar .step-display {
  font-size: 11px; color: rgba(255,255,255,0.7); font-weight: 600;
}
.story-bar .step-display b { color: white; font-weight: 800; }
.story-bar .step-label {
  font-size: 14px; font-weight: 700; flex: 1; min-width: 0;
}
.story-bar button {
  background: rgba(255,255,255,0.15); color: white; border: none;
  padding: 8px 12px; border-radius: 10px; font: inherit; font-size: 12px;
  font-weight: 700; cursor: pointer; transition: background 0.15s;
}
.story-bar button:hover { background: rgba(255,255,255,0.28); }
.story-bar button:disabled { opacity: 0.3; cursor: not-allowed; }
.story-progress {
  display: flex; gap: 3px; margin-top: 8px;
}
.story-progress span {
  flex: 1; height: 3px; border-radius: 999px; background: rgba(255,255,255,0.18);
  transition: background 0.3s;
}
.story-progress span.done { background: #67e8f9; }
.story-progress span.now { background: white; }
.story-bar-wrap {
  position: sticky; bottom: 16px; display: flex; justify-content: center;
  z-index: 8; margin-top: 22px;
}
.story-bar-wrap .inner {
  background: rgba(20,20,20,0.94); color: white;
  backdrop-filter: blur(20px); border-radius: 18px;
  padding: 14px 18px; box-shadow: 0 12px 36px rgba(0,0,0,0.32);
  max-width: 760px; width: 100%;
}
.story-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.story-meta .crumb {
  font-size: 11px; color: rgba(255,255,255,0.65); font-weight: 600;
}
.story-meta .crumb b { color: white; font-weight: 800; }
.story-controls { display: flex; align-items: center; gap: 10px; }
.story-controls .label {
  flex: 1; font-size: 14px; font-weight: 700; line-height: 1.3;
}
.story-controls .label .num {
  display: inline-block; background: rgba(255,255,255,0.15);
  padding: 2px 8px; border-radius: 999px; font-size: 11px;
  margin-right: 6px; font-variant-numeric: tabular-nums;
}
.story-controls button {
  background: rgba(255,255,255,0.16); color: white; border: none;
  padding: 9px 14px; border-radius: 10px; font: inherit; font-size: 13px;
  font-weight: 700; cursor: pointer;
}
.story-controls button.primary { background: #67e8f9; color: #0b1f4a; }
.story-controls button:disabled { opacity: 0.3; cursor: not-allowed; }
.story-controls button:hover:not(:disabled) { transform: translateY(-1px); }

/* === Courier action visualization === */
.action-hero {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--card-radius); padding: 16px;
  box-shadow: var(--shadow); margin-bottom: 14px;
  border-left: 4px solid var(--accent-warm);
}
.t-B .action-hero { border-left-color: #67e8f9; backdrop-filter: blur(18px) saturate(140%); }
.t-C .action-hero { border-left-color: #14b8a6; }
.action-hero-tag {
  font-size: 10px; font-weight: 800; letter-spacing: 0.12em;
  color: var(--accent-warm); text-transform: uppercase; margin-bottom: 6px;
}
.t-B .action-hero-tag { color: #67e8f9; }
.t-C .action-hero-tag { color: #14b8a6; }
.action-hero-title { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.25; }
.action-hero-sub { font-size: 13px; color: var(--ink-soft); margin-top: 6px; line-height: 1.5; }
.action-hero-sub b { color: var(--ink); font-weight: 800; }
.primary-cta {
  margin-top: 12px; background: var(--accent-warm) !important; color: white !important;
  font-size: 16px; box-shadow: 0 8px 24px rgba(217,119,6,0.32);
}
.t-B .primary-cta { background: #06b6d4 !important; color: #0b1f4a !important; box-shadow: 0 8px 24px rgba(6,182,212,0.32); }
.t-C .primary-cta { background: #14b8a6 !important; box-shadow: 0 8px 24px rgba(20,184,166,0.28); }

/* Bundle viz inside queue action */
.bundle-viz {
  margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line);
}
.bv-row {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 0; font-size: 12px; color: var(--ink-soft);
}
.bv-icon { font-size: 18px; }
.bv-arrow { color: var(--ink-soft); font-weight: 800; }
.bv-count {
  margin-left: auto; background: var(--bg-soft, rgba(0,0,0,0.05));
  padding: 3px 10px; border-radius: 999px;
  font-weight: 800; color: var(--accent-warm); font-size: 11px;
}
.t-B .bv-count { background: rgba(103,232,249,0.18); color: #a5f3fc; }
.t-C .bv-count { background: #d6ece4; color: #0d9488; }

/* Route tracker (vertical timeline) */
.route-tracker {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--card-radius); padding: 14px 18px;
  margin-bottom: 14px; box-shadow: var(--shadow);
}
.t-B .route-tracker { backdrop-filter: blur(18px) saturate(140%); }
.rt-step {
  display: flex; align-items: center; gap: 14px;
  padding: 6px 0; position: relative;
}
.rt-step + .rt-step::before {
  content: ""; position: absolute; top: -10px; left: 12px;
  width: 2px; height: 18px; background: var(--line);
}
.rt-step.done + .rt-step::before { background: #22c55e; }
.rt-num {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--line); color: var(--ink-soft);
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 12px; flex-shrink: 0;
}
.rt-step.done .rt-num { background: #22c55e; color: white; }
.rt-step.now .rt-num {
  background: var(--accent-warm); color: white;
  animation: rt-now-pulse 1.4s ease-in-out infinite;
}
@keyframes rt-now-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(217,119,6,0.5); }
  50%      { box-shadow: 0 0 0 8px rgba(217,119,6,0); }
}
.t-B .rt-step.now .rt-num { background: #06b6d4; animation-name: rt-now-pulse-b; }
@keyframes rt-now-pulse-b {
  0%, 100% { box-shadow: 0 0 0 0 rgba(6,182,212,0.6); }
  50%      { box-shadow: 0 0 0 8px rgba(6,182,212,0); }
}
.t-C .rt-step.now .rt-num { background: #14b8a6; animation-name: rt-now-pulse-c; }
@keyframes rt-now-pulse-c {
  0%, 100% { box-shadow: 0 0 0 0 rgba(20,184,166,0.5); }
  50%      { box-shadow: 0 0 0 8px rgba(20,184,166,0); }
}
.rt-label {
  font-size: 14px; font-weight: 700; color: var(--ink); flex: 1;
}
.rt-step:not(.done):not(.now) .rt-label { color: var(--ink-soft); font-weight: 600; }
.rt-time {
  font-size: 11px; color: var(--ink-soft); font-weight: 600; margin-top: 1px;
}

/* Bundle box (4-item group) */
.bundle-box {
  background: var(--card); border: 2px dashed var(--accent-warm);
  border-radius: var(--card-radius); padding: 8px;
  margin-bottom: 10px; box-shadow: var(--shadow);
  position: relative;
}
.bundle-box::before {
  content: "묶음 4건"; position: absolute; top: -10px; left: 14px;
  background: var(--accent-warm); color: white;
  padding: 2px 8px; border-radius: 999px;
  font-size: 10px; font-weight: 800; letter-spacing: 0.08em;
}
.t-B .bundle-box { border-color: #67e8f9; backdrop-filter: blur(18px) saturate(140%); }
.t-B .bundle-box::before { background: #06b6d4; color: #0b1f4a; }
.t-C .bundle-box { border-color: #14b8a6; }
.t-C .bundle-box::before { background: #14b8a6; }
.bundle-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 8px; border-radius: 10px;
}
.bundle-item + .bundle-item { border-top: 1px solid var(--line); }
.bundle-item.done { opacity: 0.6; }
.bundle-item.now { background: rgba(217,119,6,0.06); }
.t-B .bundle-item.now { background: rgba(103,232,249,0.1); }
.t-C .bundle-item.now { background: #ecf9f4; }
.bundle-tag {
  font-size: 10px; font-weight: 800; color: var(--ink-soft);
  background: var(--bg-soft, rgba(0,0,0,0.05));
  padding: 3px 6px; border-radius: 6px; flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}
.bundle-body { flex: 1; font-size: 13px; font-weight: 700; }
.bundle-body span { display: block; font-size: 11px; color: var(--ink-soft); font-weight: 500; margin-top: 1px; }
.bundle-check {
  width: 24px; height: 24px; border-radius: 6px;
  background: var(--bg-soft, rgba(0,0,0,0.05));
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800; color: var(--ink-soft);
}
.bundle-check.done { background: #22c55e; color: white; }
.bundle-item.done .bundle-body { text-decoration: line-through; color: var(--ink-soft); }

/* Bundle progress (horizontal dots) */
.bundle-progress {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--card-radius); padding: 14px;
  margin-bottom: 12px; box-shadow: var(--shadow);
}
.t-B .bundle-progress { backdrop-filter: blur(18px) saturate(140%); }
.bp-label {
  font-size: 11px; font-weight: 800; letter-spacing: 0.08em;
  color: var(--ink-soft); text-transform: uppercase; margin-bottom: 10px;
}
.bp-dots {
  display: flex; align-items: center;
}
.bp-dot {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--line); color: var(--ink-soft);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800; flex-shrink: 0;
}
.bp-dot.done { background: #22c55e; color: white; }
.bp-dot.now  { background: var(--accent-warm); color: white;
  box-shadow: 0 0 0 4px rgba(217,119,6,0.18); }

    ctx.nowOrders = state.groupbuyMembers;
  }
  $('#ctx-summary').innerHTML = `<b>${ctx.time}</b> · ${ctx.tempC.toFixed(1)}°C 체감 <b>${ctx.feelsLikeC.toFixed(1)}°C</b> · 수요 <b>×${ctx.surge.toFixed(1)}</b>`;
  $('#toolbar-summary').innerHTML = `시나리오 <b>${ctx.name}</b> · 역할 <b>${roleLabel()}</b> · 단계 <b>${state.storyStep}/${currentStory().length}</b>`;

  const root = $('#phones');
  root.innerHTML = '';
  state.themes.forEach(th => root.appendChild(renderPhone(th, ctx)));
  renderStoryBar(ctx);
}

function roleLabel() { return { customer: '손님', merchant: '사장님', courier: '배달원' }[state.role]; }

function renderPhone(theme, ctx) {
  const phone = el('div', `phone t-${theme} scenario-${ctx.scenario}`);
  const screen = el('div', 'screen');
  phone.appendChild(screen);

  // statusbar — single root element (html() returns firstElementChild only)
  screen.appendChild(html(`
    <div class="statusbar">
      <span>${ctx.time}</span>
      <span class="icons"><span style="font-size:11px;">📶</span><span style="font-size:11px;">📡</span><span style="font-size:11px;font-weight:700;">87%</span>🔋</span>
    </div>
  `));
  screen.appendChild(html(`<div class="home-indicator"></div>`));

  const step = currentStep();
  try {
    if (state.role === 'customer') {
      renderCustomerStep(screen, ctx, step, theme);
    } else if (state.role === 'merchant') {
      renderMerchantStep(screen, ctx, step, theme);
    } else {
      renderCourierStep(screen, ctx, step, theme);
    }
  } catch (err) {
    const msg = (err && err.message) || String(err);
    const stack = (err && err.stack) || '';
    console.error('[parasol-v2] render error', { theme, role: state.role, step: step.id, err });
    // Also surface to global red box at top of page
    showGlobalError(`[${state.role}/${step.id}/${theme}] ${msg} :: ${stack.split('\n').slice(1,3).join(' | ')}`);
    const errBody = el('div', 'screen-body');
    errBody.innerHTML = `<div style="padding:20px;color:#dc2626;font-size:12px;line-height:1.6;">
      <b>Render error</b><br>${step.id} / ${theme}<br><br>
      <code style="font-size:10px;display:block;background:rgba(220,38,38,0.08);padding:8px;border-radius:6px;word-break:break-all;">${msg}</code>
      <details style="margin-top:10px;font-size:10px;"><summary>stack</summary><pre style="white-space:pre-wrap;font-size:9px;">${stack.replace(/</g,'&lt;')}</pre></details>
    </div>`;
    screen.appendChild(errBody);
  }

  phone.appendChild(html(`<div class="screen-label">Theme ${theme} · ${step.label}</div>`));
  return phone;
}

function activeTrigger(ctx) {
  if (ctx.scenario === 'heatwave' || ctx.feelsLikeC >= 33) return { kind: 'heat', label: '폭염 부스팅', body: `지금 체감 ${ctx.feelsLikeC.toFixed(1)}°C · 옆 파라솔 ${ctx.nowOrders}곳 공동주문 중`, cta: '–30% 합류' };
  if (ctx.scenario === 'heatup')   return { kind: 'heatup', label: 'UV 경보', body: `자외선 ${ctx.uvIdx.toFixed(1)} 매우 강함 · 선크림+그늘 메뉴 묶음`, cta: '함께' };
  if (ctx.scenario === 'sunset')   return { kind: 'sunset', label: '노을 모드', body: `${ctx.minutesToSunset}분 후 노을 · 19:24 정각 배달 패키지`, cta: '한정 12셋' };
  if (ctx.scenario === 'rain')     return { kind: 'rain', label: '5분 내 소나기', body: `강수확률 ${Math.round(ctx.rainProb30m*100)}% · 우산+컵라면 묶음`, cta: '–25%' };
  if (ctx.scenario === 'tide')     return { kind: 'tide', label: '만조 1시간 전', body: `${ctx.minutesToHighTide}분 후 만조 · 자리 옮기시면서 미리 받기`, cta: '예약' };
  if (ctx.scenario === 'morning')  return { kind: 'morning', label: '아침 모드', body: '햇빛 아직 부드러움 · 따뜻한 라떼 + 아침 김밥 추천', cta: '아침 셋' };
  if (ctx.scenario === 'night')    return { kind: 'night', label: '야간 모드', body: '21:30 마지막 주문 · 야식 메뉴 한정 운영', cta: '주문' };
  return null;
}

  let item, was, now, delta, timer, goal;

  const filled = Math.min(100, (ctx.nowOrders / goal) * 100);
  return html(`
    <div class="groupbuy">
      <div class="gb-head">
        <span class="gbt">${ctx.scenario==='sunset'?'노을 패키지':ctx.scenario==='rain'?'소나기 묶음':ctx.scenario==='heatup'?'UV 묶음':'옆 파라솔 공동구매'}</span>
        <span class="timer">${timer}</span>

      <div class="gb-price">
        <span class="now" data-gb-now>₩ ${now.toLocaleString()}</span>
        <span class="was">₩ ${was.toLocaleString()}</span>
        <span class="delta">${delta}</span>
      </div>
      <div class="progress"><div class="fill" style="width:${filled}%"></div></div>
      <div class="progress-meta">
        <span><b data-gb-count>${ctx.nowOrders}</b>명 합류</span>
        <span>${goal}명까지 ${delta}</span>
      </div>
      <div class="avatars">
        <span>김</span><span>이</span><span>박</span><span>최</span>
        <span class="more">+${Math.max(0, ctx.nowOrders-4)}</span>
      </div>

        같은 시간 같은 메뉴를 시키는 옆 파라솔과 자동으로 묶입니다. 묶일수록 가격 ↓, 배달원 한 번에 →, 도착 ↑.
      </div>`:''}
    </div>
  `);
}

function formatEta(sec) {
  const m = Math.floor(sec/60);
  const s = sec % 60;
  return `<span style="font-variant-numeric:tabular-nums;">${m}<span class="unit">분</span> ${s.toString().padStart(2,'0')}<span class="unit">초</span></span>`;
}

  if (ctx.scenario === 'heatwave')return `☀️ <b>폭염 보정</b>: 33°C 이상에서는 도착 ±2분이 정상 범위로 처리돼요. 박성훈 배달원의 평점이 이번에 영향받지 않습니다.`;
  if (ctx.scenario === 'sunset')  return `🌅 <b>정각 보정</b>: 노을 패키지는 19:24 ±1분에 도착 시 만점, 박성훈님은 +12초 만에 도착했어요.`;

function renderStoryBar(ctx) {
  const st = currentStory();
  const i = Math.min(state.storyStep, st.length);
  const step = st[i-1];
  $('#story-title').textContent = `${ctx.name} · ${roleLabel()} 시나리오`;
  $('#story-num').textContent = `${i} / ${st.length}`;
  $('#story-label').textContent = step ? step.label : '';
  $('#story-prev').disabled = i <= 1;
  $('#story-next').disabled = i >= st.length;
  const prog = $('#story-progress');
  prog.innerHTML = '';
  st.forEach((_, idx) => {
    const cls = idx + 1 < i ? 'done' : idx + 1 === i ? 'now' : '';
    prog.appendChild(html(`<span class="${cls}"></span>`));
  });
}

/* ===== helpers ===== */
function el(tag, cls, text) {
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (text != null) n.textContent = text;
  return n;
}
function html(s) {
  const d = document.createElement('template');
  d.innerHTML = s.trim();
  // Return a DocumentFragment so multi-root templates append all children, not just the first.
  return d.content.cloneNode(true);
}

/* ===== Bindings ===== */
$('#toolbar-head').addEventListener('click', () => {
  $('#toolbar').classList.toggle('open');
});

$$('#scenarios .pill').forEach(b => b.addEventListener('click', () => {
  state.scenario = b.dataset.sc;
  state.storyStep = 1;
  state.groupbuyMembers = scenarios[state.scenario].nowOrders;
  $$('#scenarios .pill').forEach(p => p.classList.remove('active'));
  b.classList.add('active');
  renderPhones();
}));

$$('#themes .pill').forEach(b => b.addEventListener('click', () => {
  const th = b.dataset.th;
  b.classList.toggle('active');
  state.themes = $$('#themes .pill').filter(p => p.classList.contains('active')).map(p => p.dataset.th);
  if (state.themes.length === 0) {
    b.classList.add('active');
    state.themes = [th];
  }
  state.themes.sort();
  renderPhones();
}));

$$('#roles .pill').forEach(b => b.addEventListener('click', () => {
  state.role = b.dataset.rl;
  state.storyStep = 1;
  $$('#roles .pill').forEach(p => p.classList.remove('active'));
  b.classList.add('active');
  renderPhones();
}));

$('#story-prev').addEventListener('click', () => {
  if (state.storyStep > 1) { state.storyStep--; renderPhones(); }
});
$('#story-next').addEventListener('click', () => {
  const st = currentStory();
  if (state.storyStep < st.length) { state.storyStep++; renderPhones(); }
});

/* Keyboard: arrow keys advance story */
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowRight') { $('#story-next').click(); }
  if (e.key === 'ArrowLeft')  { $('#story-prev').click(); }
});

/* Live counters — groupbuy member ticks every 3s on heatwave/heatup */
setInterval(() => {
  if ((state.scenario === 'heatwave' || state.scenario === 'heatup') &&
      currentStep().id === 'home') {
    state.groupbuyMembers = Math.min(60, state.groupbuyMembers + (Math.random() < 0.5 ? 1 : 0));
    // partial update without full re-render: just tick the count + width
    $$('[data-gb-count]').forEach(n => n.textContent = state.groupbuyMembers);
    const goal = 60;
    const filled = Math.min(100, (state.groupbuyMembers / goal) * 100);
    $$('.groupbuy .progress .fill').forEach(f => f.style.width = `${filled}%`);
  }
}, 3000);

/* Live ETA countdown — ticks every 1s when on customer 'live' step */
setInterval(() => {
  if (state.role === 'customer' && currentStep().id === 'live' && state.liveEtaSec > 0) {
    state.liveEtaSec--;
    $$('.live-eta').forEach(n => n.innerHTML = formatEta(state.liveEtaSec));
  }
}, 1000);

renderPhones();
</script>
